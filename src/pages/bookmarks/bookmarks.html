<!--
  bookmarks.html
  Main UI page for Yet Another Bookmark Manager (YABM).

  This page is opened by the service worker when the extension toolbar icon
  is clicked, and is also used as the options_page entry point (opened with
  ?openConfig=1 to pre-open the configuration modal).

  Script load order matters — shared libraries must be loaded before the
  feature modules that depend on them:
    1. i18n.js      → window.YABMI18n  (locale, translation)
    2. sync-utils.js → window.YABMSync  (WebDAV, import/export)
    3. Feature modules (notifications, scrollbar, favicon, modals, tree, …)
    4. bookmarks.js  (orchestrator — wires everything together)
-->
<!doctype html>
<html lang="en">
    <!-- ═══════════════════════ HEAD ═══════════════════════ -->
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="bookmarksPageTitle">Yet Another Bookmark Manager</title>
        <!-- Google Fonts: Space Grotesk (UI text) + Material Symbols Outlined (icons) -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
        <link rel="stylesheet" href="bookmarks.css" />
    </head>
    <!-- ═══════════════════════ BODY ═══════════════════════ -->
    <body>
        <!-- ── Notification toast: slides in from the top, role=status for SR ── -->
        <div id="top-toast" class="top-toast hidden" role="status" aria-live="polite"></div>
        <!-- ── Indeterminate / determinate progress bar along the top edge ── -->
        <div id="top-progress" class="top-progress hidden" aria-hidden="true">
            <span class="top-progress-bar"></span>
        </div>

        <!-- ══════════════════════ MAIN PANEL ══════════════════════ -->
        <main class="container">
            <!-- ── App header: title, WebDAV actions, sync status ── -->
            <header>
                <div class="header-top">
                    <h1 class="title">
                        <img
                            class="title-icon"
                            src="../../assets/icons/icon128.png"
                            width="32"
                            height="32"
                            alt=""
                        />
                        Yet Another Bookmark Manager
                    </h1>
                    <!-- Version badge; text is injected by bookmarks.js -->
                    <span
                        id="app-version"
                        class="app-version"
                        data-i18n-tooltip="appVersionTooltip"
                        data-tooltip="Extension version"
                    >v-</span>
                </div>
                <!-- Toolbar: WebDAV status, upload/download, config, language -->
                <div class="tree-actions" data-i18n-aria-label="treeActionsAria" aria-label="Bookmark tree actions">
                    <!-- WebDAV connection state icon (checking/ready/error/not-configured) -->
                    <span
                        id="webdav-status-indicator"
                        class="webdav-status-indicator"
                        role="img"
                        aria-label="WebDAV status"
                        data-tooltip="WebDAV: checking"
                    >
                        <img
                            id="webdav-status-icon"
                            class="webdav-status-icon"
                            src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/23f3.svg"
                            alt=""
                        />
                    </span>
                    <!-- WebDAV upload / download buttons -->
                    <button
                        id="upload-bookmarks"
                        class="tree-btn"
                        type="button"
                    >
                        <span class="icon-font" aria-hidden="true">upload</span>
                        <span data-i18n="btnUpload">Upload</span>
                    </button>
                    <button
                        id="download-bookmarks"
                        class="tree-btn"
                        type="button"
                    >
                        <span class="icon-font" aria-hidden="true">download</span>
                        <span data-i18n="btnDownload">Download</span>
                    </button>
                    <!-- Icon-only buttons: configuration modal trigger, language switcher -->
                    <button
                        id="open-config"
                        class="tree-btn tree-btn-soft tree-btn-icon-only"
                        type="button"
                        data-i18n-aria-label="btnConfiguration"
                        data-i18n-tooltip="btnConfiguration"
                        aria-label="Configuration"
                        data-tooltip="Configuration"
                    >
                        <span class="icon-font" aria-hidden="true">settings</span>
                    </button>
                    <button
                        id="open-language-menu"
                        class="tree-btn tree-btn-soft tree-btn-icon-only"
                        type="button"
                        aria-label="Language"
                        data-tooltip="Language"
                    >
                        <span class="icon-font" aria-hidden="true">translate</span>
                    </button>
                    <button
                        id="open-theme-menu"
                        class="tree-btn tree-btn-soft tree-btn-icon-only"
                        type="button"
                        data-i18n-aria-label="themeButton"
                        aria-label="Theme"
                        data-tooltip="Theme"
                    >
                        <span
                            class="theme-symbol-icon"
                            aria-hidden="true"
                        >contrast</span>
                    </button>
                </div>
                <!-- Inline status message below toolbar (e.g., last sync time) -->
                <p id="sync-status" class="sync-status is-hidden" aria-live="polite"></p>
            </header>

            <!-- ══════════════════ BOOKMARK PANEL ══════════════════ -->
            <section class="bookmark-panel" data-i18n-aria-label="bookmarkPanelAria" aria-label="Bookmarks">
                <!-- Panel toolbar: folder/bookmark counts, expand/collapse all -->
                <div class="bookmark-panel-head">
                    <!-- Live-updated folder and bookmark counters -->
                    <div class="bookmark-summary" aria-live="polite">
                        <span id="tree-folder-count" class="summary-pill" data-i18n="summaryFoldersInitial">Folders: -</span>
                        <span id="tree-bookmark-count" class="summary-pill" data-i18n="summaryBookmarksInitial">Bookmarks: -</span>
                    </div>
                    <!-- Expand-all / collapse-all tree controls -->
                    <div class="bookmark-panel-actions">
                        <button
                            id="expand-all"
                            class="tree-btn tree-btn-soft tree-btn-icon-only"
                            type="button"
                            data-i18n-aria-label="expandAllFolders"
                            data-i18n-tooltip="expandAllFolders"
                            aria-label="Expand all folders"
                            data-tooltip="Expand all folders"
                        >
                            <span class="icon-font" aria-hidden="true">unfold_more</span>
                        </button>
                        <button
                            id="collapse-all"
                            class="tree-btn tree-btn-soft tree-btn-icon-only"
                            type="button"
                            data-i18n-aria-label="collapseAllFolders"
                            data-i18n-tooltip="collapseAllFolders"
                            aria-label="Collapse all folders"
                            data-tooltip="Collapse all folders"
                        >
                            <span class="icon-font" aria-hidden="true">unfold_less</span>
                        </button>
                    </div>
                </div>
            <!-- Bookmark tree root — populated dynamically by bookmark-tree-render.js -->
            <section
                id="bookmark-list"
                class="bookmark-list"
                aria-live="polite"
            ></section>
            </section>
        </main>
        <!-- ══════════════════ CUSTOM SCROLLBAR ══════════════════ -->
        <!-- Positioned via JS (custom-scrollbar.js); hidden from assistive tech -->
        <div id="bookmark-scrollbar" class="bookmark-scrollbar hidden" aria-hidden="true">
            <span id="bookmark-scrollbar-thumb" class="bookmark-scrollbar-thumb"></span>
        </div>
        <!-- Arrow buttons for keyboard / click-based scrolling -->
        <button id="bookmark-scroll-up" class="bookmark-scroll-arrow bookmark-scroll-arrow-up hidden" type="button" aria-label="Scroll up"></button>
        <button id="bookmark-scroll-down" class="bookmark-scroll-arrow bookmark-scroll-arrow-down hidden" type="button" aria-label="Scroll down"></button>

        <!-- ═════════════════════ MODALS ═════════════════════ -->

        <!--
          Config modal — WebDAV configuration.
          Opened when the user clicks the settings button or when the page is
          loaded with ?openConfig=1 (extensions options shortcut).
        -->
        <div
            id="config-modal"
            class="modal hidden"
            role="dialog"
            aria-modal="true"
            aria-labelledby="config-title"
        >
            <div id="config-backdrop" class="modal-backdrop"></div>
            <section class="modal-panel">
                <header class="modal-header">
                    <h2 id="config-title" data-i18n="optionsHeading">WebDAV Configuration</h2>
                    <button
                        id="close-config"
                        class="icon-btn"
                        type="button"
                        data-i18n-aria-label="close"
                        aria-label="Close"
                    >
                        x
                    </button>
                </header>

                <div class="modal-body">
                    <!-- WebDAV directory URL — must be HTTPS; validated before save -->
                    <label class="field">
                        <span data-i18n="webdavUrlLabel">WebDAV URL (directory, HTTPS only)</span>
                        <input
                            id="cfg-directory-url"
                            type="url"
                            data-i18n-placeholder="webdavUrlPlaceholder"
                            placeholder="https://example.com/webdav/"
                        />
                    </label>

                    <!-- Optional Basic Auth credentials (stored in chrome.storage.local) -->
                    <div class="field-row">
                        <label class="field">
                            <span data-i18n="usernameOptional">Username (optional)</span>
                            <input
                                id="cfg-username"
                                type="text"
                                autocomplete="username"
                            />
                        </label>
                        <label class="field">
                            <span data-i18n="passwordOptional">Password (optional)</span>
                            <input
                                id="cfg-password"
                                type="password"
                                autocomplete="current-password"
                            />
                        </label>
                    </div>

                    <div class="actions-row">
                        <button id="cfg-test" class="tree-btn" type="button">
                            <span data-i18n="testConnection">Test connection</span>
                        </button>
                    </div>

                    <!-- File list section — revealed after a successful connection test -->
                    <section id="cfg-file-section" class="collapsed">
                        <h3 class="section-title" data-i18n="filesInDirectory">Files in directory</h3>
                        <div id="cfg-files" class="files"></div>
                        <label class="field">
                            <span data-i18n="newFileNameLabel">New file name (default: bookmarks.html)</span>
                            <input
                                id="cfg-new-file-name"
                                type="text"
                                value="bookmarks.html"
                            />
                        </label>
                    </section>

                    <!-- Inline status for connection test result / save feedback -->
                    <p
                        id="cfg-status"
                        class="sync-status is-hidden"
                        aria-live="polite"
                    ></p>
                </div>

                <footer class="modal-footer modal-footer-actions">
                    <button
                        id="cfg-clear"
                        class="tree-btn tree-btn-soft"
                        type="button"
                    >
                        <span data-i18n="clearConfig">Clear config</span>
                    </button>
                    <button
                        id="cfg-cancel"
                        class="tree-btn tree-btn-soft"
                        type="button"
                    >
                        <span data-i18n="cancel">Cancel</span>
                    </button>
                    <button id="cfg-save" class="tree-btn" type="button">
                        <span data-i18n="saveConfiguration">Save configuration</span>
                    </button>
                </footer>
            </section>
        </div>

        <!--
          Prompt modal — generic confirmation dialog.
          Message and confirm-button label are set dynamically by modals.js.
        -->
        <div
            id="prompt-modal"
            class="modal hidden"
            role="dialog"
            aria-modal="true"
            aria-labelledby="prompt-title"
        >
            <div class="modal-backdrop"></div>
            <section class="modal-panel modal-panel-sm">
                <header class="modal-header">
                    <h2 id="prompt-title" data-i18n="promptNotice">Notice</h2>
                </header>
                <div class="modal-body">
                    <p id="prompt-message" class="prompt-message"></p>
                </div>
                <footer class="modal-footer modal-footer-actions">
                    <button id="prompt-cancel" class="tree-btn tree-btn-soft" type="button">
                        <span data-i18n="cancel">Cancel</span>
                    </button>
                    <button id="prompt-confirm" class="tree-btn" type="button">
                        <span data-i18n="promptConfirm">Confirm</span>
                    </button>
                </footer>
            </section>
        </div>

        <!--
          Editor modal — inline edit for bookmark name/URL or folder name.
          The URL field is shown only when editing a bookmark (hidden for folders).
        -->
        <div
            id="editor-modal"
            class="modal hidden"
            role="dialog"
            aria-modal="true"
            aria-labelledby="editor-title"
        >
            <div class="modal-backdrop"></div>
            <section class="modal-panel modal-panel-sm">
                <header class="modal-header">
                    <h2 id="editor-title" data-i18n="editorEdit">Edit</h2>
                </header>
                <div class="modal-body">
                    <label class="field">
                        <span id="editor-name-label" data-i18n="editorName">Name</span>
                        <input id="editor-name" type="text" />
                    </label>
                    <label id="editor-url-field" class="field hidden">
                        <span data-i18n="editorUrl">URL</span>
                        <input
                            id="editor-url"
                            type="url"
                            data-i18n-placeholder="urlPlaceholder"
                            placeholder="https://example.com"
                        />
                    </label>
                    <p id="editor-status" class="sync-status is-hidden" aria-live="polite"></p>
                </div>
                <footer class="modal-footer modal-footer-actions">
                    <button id="editor-cancel" class="tree-btn tree-btn-soft" type="button">
                        <span data-i18n="cancel">Cancel</span>
                    </button>
                    <button id="editor-save" class="tree-btn" type="button">
                        <span data-i18n="save">Save</span>
                    </button>
                </footer>
            </section>
        </div>

        <!-- ═════════════════ CONTEXTUAL MENUS ═════════════════ -->

        <!-- Folder sort menu: ascending / descending by name -->
        <div id="folder-sort-menu" class="sort-menu hidden" role="menu" data-i18n-aria-label="sortFolder" aria-label="Sort folder">
            <button id="sort-asc" class="sort-menu-item" type="button" role="menuitem">
                <span class="sort-menu-icon" aria-hidden="true">
                    <span class="icon-font">arrow_upward</span>
                </span>
                <span data-i18n="sortAscending">Sort ascending</span>
            </button>
            <button id="sort-desc" class="sort-menu-item" type="button" role="menuitem">
                <span class="sort-menu-icon" aria-hidden="true">
                    <span class="icon-font">arrow_downward</span>
                </span>
                <span data-i18n="sortDescending">Sort descending</span>
            </button>
        </div>

        <!-- Right-click context menu for bookmark items (open, edit, delete, …) -->
        <div
            id="tree-context-menu"
            class="tree-context-menu hidden"
            role="menu"
            data-i18n-aria-label="bookmarkActionsAria"
            aria-label="Bookmark actions"
        ></div>

        <!-- Right-click context menu for editable text nodes (rename, cut, …) -->
        <div
            id="edit-context-menu"
            class="tree-context-menu hidden"
            role="menu"
            data-i18n-aria-label="editActionsAria"
            aria-label="Edit actions"
        ></div>
        <!-- Language switcher dropdown; items injected by bookmarks.js -->
        <div id="language-menu" class="sort-menu hidden" role="menu" aria-label="Language"></div>
        <!-- Theme switcher dropdown; items injected by bookmarks.js -->
        <div
            id="theme-menu"
            class="sort-menu hidden"
            role="menu"
            data-i18n-aria-label="themeMenuAria"
            aria-label="Theme"
        ></div>

        <!-- Global tooltip — repositioned near the hovered element by bookmarks.js -->
        <div id="app-tooltip" class="app-tooltip hidden" role="tooltip"></div>

        <!-- ════════════════════ BOTTOM STATUS BAR ════════════════════ -->
        <!--
          Persistent footer strip showing the configured WebDAV URL and
          entry-count comparison between the WebDAV file and the browser.
        -->
        <footer class="bottom-status" aria-live="polite">
            <div class="bottom-status-main">
                <span class="bottom-status-label" data-i18n="webdavLabel">WebDAV</span>
                <span id="webdav-url" class="bottom-status-url" data-i18n="notConfigured">Not configured</span>
                <span id="webdav-count" class="bottom-status-count" data-i18n="webdavEntriesDash">WebDAV entries: -</span>
                <span id="browser-count" class="bottom-status-count" data-i18n="browserEntriesDash">Browser entries: -</span>
            </div>
            <button id="webdav-refresh" class="tree-btn tree-btn-soft" type="button">
                <span data-i18n="refresh">Refresh</span>
            </button>
        </footer>

        <!-- ════════════════════════ SCRIPTS ════════════════════════ -->
        <!--
          Load order is significant:
            Shared libs first, then feature modules, then the orchestrator.
            Do NOT switch to ES modules without updating the entire project.
        -->
        <!-- Shared libraries (expose window.YABMI18n and window.YABMSync) -->
        <script src="../../lib/i18n.js"></script>
        <script src="../../lib/theme.js"></script>
        <script src="../../lib/sync-utils.js"></script>
        <!-- Feature modules (depend on the libs above) -->
        <script src="notifications.js"></script>
        <script src="custom-scrollbar.js"></script>
        <script src="favicon-cache.js"></script>
        <script src="modals.js"></script>
        <script src="bookmark-tree-state.js"></script>
        <script src="bookmark-tree-dnd.js"></script>
        <script src="bookmark-tree-observers.js"></script>
        <script src="bookmark-tree-mutations.js"></script>
        <script src="bookmark-tree-menu.js"></script>
        <script src="bookmark-tree-render.js"></script>
        <script src="bookmark-tree.js"></script>
        <!-- Orchestrator — initialises and wires all modules together -->
        <script src="bookmarks.js"></script>
    </body>
</html>
